name: Tests (pytest)

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
    paths:
      - "**.csv"
      - "**.npy"
      - "**.out"
      - "**.pkl"
      - "**.png"
      - "**.py"
      - "**.toml"
      - "**.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Ex1 (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        # TopoStats can't support Python >= 3.12 due to an issue with dependency Topoly (see
        # https://github.com/AFM-SPM/TopoStats/issues/927)
        python-version: ["3.10", "3.11"]
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install and setup uv with python
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: 3.11
      - run: |
          uv venv --python 3.11
      - name: Activate virtual environment
        shell: bash
        run: |
          if [ "${RUNNER_OS}" == "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
      - name: Activate venv and install package with dev dependencies
        shell: bash
        run: |
          uv pip install -e . --group dev
      - name: Test with pytest
        run: |
          pytest --cov=src --numprocesses=logical
      - name: Determine coverage
        run: |
          coverage xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6

      - name: Setup tmate session
        if: ${{ failure() }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 1
